name: morganite
version: 0.2.3

description: |
  Morganite is a background job processing library for Crystal, inspired by Sidekiq.
  It uses Redis as a backend and supports workers, retries with exponential backoff,
  scheduled and cron jobs, a dead-letter queue, a built-in Web UI, middleware,
  unique jobs, batches, rate limiting and workflows.

authors:
  - Morganite Contributors

license: MIT

crystal: 1.20.2

targets:
  morganite:
    main: src/morganite/cli.cr

dependencies:
  redis:
    github: jgaskins/redis
    version: ~> 0.13.0
  kemal:
    github: kemalcr/kemal
    version: ~> 1.11.0

development_dependencies:
  ameba:
    github: crystal-ameba/ameba
    version: ~> 1.6.0
