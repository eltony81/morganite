name: morganite
version: 0.1.0

description: |
  Morganite is a background job processing library for Crystal, inspired by Sidekiq.
  It uses Redis as a backend and supports workers, retries, scheduled jobs,
  dead-letter queue and a built-in Web UI.

authors:
  - Morganite Contributors

license: MIT

crystal: 1.15.0

dependencies:
  redis:
    github: jgaskins/redis
    version: ~> 0.13.0
  kemal:
    github: kemalcr/kemal
    version: ~> 1.1.0

development_dependencies:
  ameba:
    github: crystal-ameba/ameba
    version: ~> 1.6.0
