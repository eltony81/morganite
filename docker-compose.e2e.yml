version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 1s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: examples/demo_app/Dockerfile
    command: ["crystal", "run", "src/demo_app.cr", "--", "work"]
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: demo
    restart: "no"

  e2e:
    build:
      context: .
      dockerfile: examples/demo_app/Dockerfile
    command: ["crystal", "run", "src/e2e.cr"]
    depends_on:
      - redis
      - worker
    environment:
      REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: demo
      EXPECTED_COUNT: "100"
      TIMEOUT_SECONDS: "30"
    restart: "no"
