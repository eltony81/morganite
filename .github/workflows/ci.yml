name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    container:
      # Pinned to the 1.20 minor line, not 1.21: Crystal 1.21.0 (released
      # 2026-07-16) added lexer changes (for %W) that ameba 1.6.4 — the
      # latest stable release as of this writing — doesn't build against
      # yet. Bump once ameba ships a 1.21-compatible release.
      image: crystallang/crystal:1.20

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      MORGANITE_REDIS_URL: redis://redis:6379/15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install dependencies
        run: shards install

      - name: Check formatting
        run: crystal tool format --check

      - name: Run linter
        run: ./lib/ameba/bin/ameba

      - name: Run tests
        run: crystal spec
