version: "3.8"

# Morganite side of scripts/run_benchmark.sh. Separate from
# docker-compose.load.yml (which builds in debug mode via `crystal run`,
# fine for correctness testing but not for a fair performance comparison
# against Ruby): this one builds with `crystal build --release`.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 1s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: examples/demo_app/Dockerfile.release
    command: ["/app/bin/demo_app", "work"]
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: load
      CONCURRENCY: "${CONCURRENCY:-10}"
    restart: "no"

  load:
    build:
      context: .
      dockerfile: examples/demo_app/Dockerfile.release
    command: ["/app/bin/load_test"]
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
      QUEUE_NAME: load
      JOB_COUNT: "${JOB_COUNT:-20000}"
      TIMEOUT_SECONDS: "${TIMEOUT_SECONDS:-180}"
    restart: "no"
